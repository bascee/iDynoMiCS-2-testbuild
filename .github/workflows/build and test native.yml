name: Build Native Images

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        type: string
        default: 'develop'
  pull_request:
    branches: [ "develop" ]

jobs:
  build-native:
    name: Native Image on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: iDynoMiCS-2-linux
            executable-suffix: ''
          - os: macos-latest
            artifact-name: iDynoMiCS-2-macos
            executable-suffix: ''
          - os: windows-latest
            artifact-name: iDynoMiCS-2-windows
            executable-suffix: '.exe'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Configure pagefile (Windows only)
        if: runner.os == 'Windows'
        uses: al-cheb/configure-pagefile-action@v1.4
        with:
          minimum-size: 10GB
          maximum-size: 12GB
          disk-root: "C:"

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      # Initializes MSVC x64 environment for native-image.cmd
      - name: Initialize MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install local dependencies
        shell: bash
        run: |
          # DasOptimization
          mvn install:install-file -Dfile=src/lib/DasOptimization.jar \
            -DgroupId=org.optimization -DartifactId=DasOptimization -Dversion=1.0 -Dpackaging=jar

          # EXIficient
          mvn install:install-file -Dfile=src/lib/exificient-core.jar \
            -DgroupId=com.siemens.ct.exi -DartifactId=exificient-core \
            -Dversion=0.9.3 -Dpackaging=jar

          mvn install:install-file -Dfile=src/lib/exificient-1.0.4.jar \
            -DgroupId=com.siemens.ct.exi -DartifactId=exificient -Dversion=1.0.4 -Dpackaging=jar

          # JUnit
          mvn install:install-file -Dfile=src/lib/JUnit/junit-4.13.2.jar \
            -DgroupId=junit -DartifactId=junit -Dversion=4.13.2 -Dpackaging=jar

          # Hamcrest
          mvn install:install-file -Dfile=src/lib/JUnit/hamcrest-core-1.3.jar \
            -DgroupId=org.hamcrest -DartifactId=hamcrest-core \
            -Dversion=1.3 -Dpackaging=jar

          # JOGL core
          mvn install:install-file -Dfile=src/lib/jogl/jogl-all.jar \
            -DgroupId=org.jogamp.jogl -DartifactId=jogl-all \
            -Dversion=2.3.2 -Dpackaging=jar

          mvn install:install-file -Dfile=src/lib/jogl/gluegen-rt.jar \
            -DgroupId=org.jogamp.gluegen -DartifactId=gluegen-rt \
            -Dversion=2.3.2 -Dpackaging=jar

          # Windows natives
          mvn install:install-file -Dfile=src/lib/jogl/jogl-all-natives-windows-amd64.jar \
            -DgroupId=org.jogamp.jogl -DartifactId=jogl-all \
            -Dversion=2.3.2 -Dclassifier=natives-windows-amd64 -Dpackaging=jar

          mvn install:install-file -Dfile=src/lib/jogl/gluegen-rt-natives-windows-amd64.jar \
            -DgroupId=org.jogamp.gluegen -DartifactId=gluegen-rt \
            -Dversion=2.3.2 -Dclassifier=natives-windows-amd64 -Dpackaging=jar

          # Linux natives
          mvn install:install-file -Dfile=src/lib/jogl/jogl-all-natives-linux-amd64.jar \
            -DgroupId=org.jogamp.jogl -DartifactId=jogl-all \
            -Dversion=2.3.2 -Dclassifier=natives-linux-amd64 -Dpackaging=jar

          mvn install:install-file -Dfile=src/lib/jogl/gluegen-rt-natives-linux-amd64.jar \
            -DgroupId=org.jogamp.gluegen -DartifactId=gluegen-rt \
            -Dversion=2.3.2 -Dclassifier=natives-linux-amd64 -Dpackaging=jar

          mvn install:install-file -Dfile=src/lib/jogl/jogl-all-natives-linux-aarch64.jar \
            -DgroupId=org.jogamp.jogl -DartifactId=jogl-all \
            -Dversion=2.3.2 -Dclassifier=natives-linux-aarch64 -Dpackaging=jar

          mvn install:install-file -Dfile=src/lib/jogl/gluegen-rt-natives-linux-aarch64.jar \
            -DgroupId=org.jogamp.gluegen -DartifactId=gluegen-rt \
            -Dversion=2.3.2 -Dclassifier=natives-linux-aarch64 -Dpackaging=jar

          mvn install:install-file -Dfile=src/lib/jogl/jogl-all-natives-linux-armv6hf.jar \
            -DgroupId=org.jogamp.jogl -DartifactId=jogl-all \
            -Dversion=2.3.2 -Dclassifier=natives-linux-armv6hf -Dpackaging=jar

          # macOS natives
          mvn install:install-file -Dfile=src/lib/jogl/jogl-all-natives-macosx-universal.jar \
            -DgroupId=org.jogamp.jogl -DartifactId=jogl-all \
            -Dversion=2.3.2 -Dclassifier=natives-macosx-universal -Dpackaging=jar

          mvn install:install-file -Dfile=src/lib/jogl/gluegen-rt-natives-macosx-universal.jar \
            -DgroupId=org.jogamp.gluegen -DartifactId=gluegen-rt \
            -Dversion=2.3.2 -Dclassifier=natives-macosx-universal -Dpackaging=jar

      - name: Build native image
        shell: bash
        run: |
          mvn -Pnative package -DskipTests -e \
            -Dnative.image.buildArgs="--add-exports java.base/java.lang=ALL-UNNAMED \
              --add-exports java.desktop/sun.awt=ALL-UNNAMED \
              --add-exports java.desktop/sun.java2d=ALL-UNNAMED \
              --no-fallback \
              --report-unsupported-elements-at-runtime \
              --initialize-at-run-time=com.jogamp.opengl,com.jogamp.gluegen \
              -H:+ReportExceptionStackTraces \
              -J-Xmx7g"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifact-bundle/icons
          # Copy the native binary
          cp target/iDynoMiCS-2${{ matrix.executable-suffix }} artifact-bundle/ || \
          cp target/*${{ matrix.executable-suffix }} artifact-bundle/
          # Copy companion native libraries emitted by native-image (Linux/macOS)
          cp target/*.so artifact-bundle/ 2>/dev/null || true
          cp target/*.dylib artifact-bundle/ 2>/dev/null || true
          cp target/*.dll artifact-bundle/ 2>/dev/null || true
          # Rest of your files...
          cp icons/*.ico artifact-bundle/icons/ 2>/dev/null || true
          cp icons/iDynoMiCS_logo_icon.png artifact-bundle/icons/ 2>/dev/null || true
          cp -r colourPalettes config protocol artifact-bundle/ 2>/dev/null || true
          cp *.md *.MD *.TXT default.cfg artifact-bundle/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifact-bundle/
