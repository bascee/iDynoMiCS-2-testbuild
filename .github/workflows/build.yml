name: build iDyno

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Install local JAR dependencies
      run: |
        # Install EXIficient
        mvn install:install-file -Dfile=src/lib/exificient-core.jar \
          -DgroupId=org.exificient -DartifactId=exificient-core \
          -Dversion=0.9.3 -Dpackaging=jar
        
        # Install JOGL
        mvn install:install-file -Dfile=src/lib/jogl/jogl-all.jar \
          -DgroupId=org.jogamp.jogl -DartifactId=jogl-all \
          -Dversion=2.3.2 -Dpackaging=jar
        
        # Install other dependencies as needed
        # ...

    - name: Build with Maven
      run: mvn clean package

    - name: Package artifacts
      run: |
        mkdir artifact-bundle
        cp target/*.jar artifact-bundle/
        cp -r colourPalettes config protocol *.md artifact-bundle/
        zip -r iDynoMiCS-bundle.zip artifact-bundle

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: iDynoMiCS-bundle
        path: iDynoMiCS-bundle.zip
