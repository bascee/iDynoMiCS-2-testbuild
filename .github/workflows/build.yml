name: build iDyno

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile Java source
      run: |
        mkdir -p target/classes
        find src -name "*.java" > sources.txt
        javac -d target/classes @sources.txt

    - name: Create executable JAR
      run: |
        mkdir -p artifact_staging
        echo "Main-Class: idynomics.Idynomics" > manifest.txt
        jar cvfm artifact_staging/iDynoMiCS.jar manifest.txt -C target/classes .
        
    - name: Package supporting files
      run: |
        cp -r colourPalettes/ artifact_staging/
        cp -r config/ artifact_staging/
        cp config.* artifact_staging/ 2>/dev/null || true
        cp -r protocol/ artifact_staging/
        cp *.md artifact_staging/

    - name: Create final artifact
      run: zip -r iDynoMiCS-artifact.zip artifact_staging/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: iDynoMiCS-bundle
        path: iDynoMiCS-artifact.zip
