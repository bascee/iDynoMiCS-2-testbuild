name: build iDyno

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Prepare directories
      run: |
        mkdir -p target/classes
        mkdir -p artifact_staging/lib

    - name: Copy dependencies
      run: |
        cp -r src/lib/jogl/*.jar artifact_staging/lib/
        cp src/lib/vecmath.jar artifact_staging/lib/
        cp src/lib/exificient*.jar artifact_staging/lib/
        cp src/lib/DasOptimization.jar artifact_staging/lib/
        cp src/lib/JUnit/*.jar artifact_staging/lib/

    - name: Compile sources (main + required tests)
      run: |
        # Include main sources and specific test classes
        find src -name "*.java" > sources.txt
        javac -d target/classes @sources.txt \
          -cp "artifact_staging/lib/*" \
          -Xlint:all \
          -Xlint:-strictfp \
          -Xlint:-removal \
          -Xlint:-dep-ann

    - name: Generate manifest
      run: |
        # Create manifest with proper line wrapping
        echo "Main-Class: idynomics.Idynomics" > manifest.txt
        echo "Class-Path: " >> manifest.txt
        
        # List JARs and format with line continuations
        (cd artifact_staging/lib && \
        ls *.jar | sed 's/^/lib\//' | \
        awk 'BEGIN {ORS=" \\\n "} {print}' | \
        fold -w 70 -s | \
        sed 's/^ /  /' ) >> ../manifest.txt
    
        # Add final newline required by spec
        echo "" >> manifest.txt
    
        - name: Create executable JAR
          run: |
            jar cvfm artifact_staging/iDynoMiCS.jar manifest.txt -C target/classes .

    - name: Package supporting files
      run: |
        cp -r colourPalettes/ artifact_staging/
        cp -r config/ artifact_staging/
        cp config.* artifact_staging/ 2>/dev/null || true
        cp -r protocol/ artifact_staging/
        cp *.md artifact_staging/

    - name: Create final artifact
      run: |
        cd artifact_staging && zip -r ../iDynoMiCS-artifact.zip . && cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: iDynoMiCS-bundle
        path: iDynoMiCS-artifact.zip
