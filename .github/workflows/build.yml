name: build iDyno

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install local dependencies
      run: |
        # Install JOGL
        mvn install:install-file -Dfile=src/lib/jogl/jogl-all.jar \
          -DgroupId=org.jogamp.jogl -DartifactId=jogl-all \
          -Dversion=2.3.2 -Dpackaging=jar

        mvn install:install-file -Dfile=src/lib/jogl/gluegen-rt.jar \
          -DgroupId=org.jogamp.gluegen -DartifactId=gluegen-rt \
          -Dversion=2.3.2 -Dpackaging=jar

        # Install EXIficient
        mvn install:install-file -Dfile=src/lib/exificient-core.jar \
          -DgroupId=com.siemens.ct.exi -DartifactId=exificient-core \
          -Dversion=0.9.3 -Dpackaging=jar

        # Install vecmath
        mvn install:install-file -Dfile=src/lib/vecmath.jar \
          -DgroupId=org.jfree -DartifactId=vecmath \
          -Dversion=1.5.2 -Dpackaging=jar

    - name: Build with Maven
      run: mvn clean package

    - name: Package artifacts
      run: |
        mkdir artifact-bundle
        cp target/iDynoMiCS-2-2.0.jar artifact-bundle/iDynoMiCS.jar
        cp -r colourPalettes config protocol *.md artifact-bundle/
        zip -r iDynoMiCS-bundle.zip artifact-bundle

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: iDynoMiCS-bundle
        path: iDynoMiCS-bundle.zip
