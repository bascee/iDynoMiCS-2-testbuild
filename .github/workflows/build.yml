name: build iDyno

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: |
        mvn clean package

    - name: Package artifacts
      run: |
        mkdir artifact-bundle
        cp -r target/lib artifact-bundle/lib
        cp target/iDynoMiCS-2-2.0.jar artifact-bundle/
        cp -r target/final-artifact/* artifact-bundle/
        cd artifact-bundle && zip -r ../iDynoMiCS-bundle.zip . && cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: iDynoMiCS-bundle
        path: iDynoMiCS-bundle.zip
